<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ITACHI ACCESS</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at center,#2a0000,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:420px;
background:rgba(15,15,15,0.85);
border-radius:20px;
padding:30px;
box-shadow:0 0 40px rgba(255,0,0,0.4);
text-align:center;
backdrop-filter:blur(8px);
}

.title{
font-size:48px;
font-weight:bold;
letter-spacing:3px;
color:#ff2a2a;
text-shadow:0 0 20px red;
}

.subtitle{
color:#aaa;
margin-bottom:20px;
}

.badges{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.badge{
background:#111;
border:1px solid #333;
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.services{
display:flex;
gap:15px;
margin-top:20px;
}

.card{
flex:1;
background:#0c0c0c;
border-radius:15px;
padding:20px;
cursor:pointer;
border:1px solid #222;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(255,0,0,0.5);
}

.netflix{
color:#e50914;
font-size:40px;
font-weight:bold;
}

.disney{
color:#3aa3ff;
font-size:30px;
font-weight:bold;
}

.buttons{
margin-top:25px;
display:flex;
gap:10px;
justify-content:center;
}

.btn{
background:#111;
border:1px solid #333;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
}

.btn:hover{
background:#1a1a1a;
}

</style>
</head>

<body>

<div class="container">

<div class="title">ITACHI</div>
<div class="subtitle">Acceso instantáneo a códigos</div>

<div class="badges">
<div class="badge">🟢 Servicio activo</div>
<div class="badge">⚡ Respuesta inmediata</div>
<div class="badge">🔒 100% seguro</div>
</div>

<h3>Selecciona tu servicio</h3>

<div class="services">

<div class="card">
<div class="netflix">N</div>
<p>Netflix</p>
</div>

<div class="card">
<div class="disney">D+</div>
<p>Disney+</p>
</div>

</div>

<div class="buttons">
<div class="btn">WhatsApp</div>
<div class="btn">Soporte</div>
</div>

</div>

</body>
</html>
